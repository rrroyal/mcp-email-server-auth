name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "mcp_email_server/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - ".github/actions/setup-python-env/**"
      - ".github/workflows/docs.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mcp_email_server/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - ".github/actions/setup-python-env/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Build docs site
        run: make docs-test

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site
          if-no-files-found: error

  deploy:
    name: Deploy docs
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      deployments: write
    environment:
      name: docs
      url: https://mcp-email-server.wh1isper.top
    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: site

      - name: Install Wrangler
        run: npm install --global wrangler@3.90.0

      - name: Ensure Cloudflare Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          project_name="mcp-email-server-docs"
          project_url="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${project_name}"
          response_file="${RUNNER_TEMP}/cloudflare-pages-project.json"

          get_project_status() {
            curl --silent --show-error \
              --output "${response_file}" \
              --write-out "%{http_code}" \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "${project_url}"
          }

          status="$(get_project_status)"
          if [[ "${status}" == "200" ]]; then
            echo "Cloudflare Pages project already exists"
          elif [[ "${status}" == "404" ]]; then
            if ! wrangler pages project create "${project_name}" --production-branch=main; then
              status="$(get_project_status)"
              if [[ "${status}" != "200" ]]; then
                cat "${response_file}" >&2
                exit 1
              fi
              echo "Cloudflare Pages project was created concurrently"
            fi
          else
            cat "${response_file}" >&2
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy site --project-name=mcp-email-server-docs --branch=main
