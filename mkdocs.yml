site_name: mcp-email-server
repo_url: https://github.com/wh1isper/mcp-email-server
site_url: https://mcp-email-server.wh1isper.top
site_description: Read, search, organize, and send email through IMAP and SMTP with MCP
site_author: wh1isper
edit_uri: edit/main/docs/
repo_name: wh1isper/mcp-email-server
copyright: Maintained by <a href="https://github.com/wh1isper">wh1isper</a>.

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Validation: validation.md
  - MCP Tools: tools.md
  - Transports: transports.md
  - Security: security.md
  - Guides: guides.md
  - Troubleshooting: troubleshooting.md
  - Contributing: https://github.com/wh1isper/mcp-email-server/blob/main/CONTRIBUTING.md

plugins:
  - search

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/wh1isper/mcp-email-server
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/mcp-email-server

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
